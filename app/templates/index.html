<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Another Hisense App Store</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Another Hisense App Store</h1>
        <div id="category-nav" class="category-nav"></div>
        <div id="app-grid" class="app-grid">
            <p id="loading-message" class="status-message">Loading Apps...</p>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- Debug panel -->
    <div id="debug-panel" style="position:fixed; bottom:10px; right:10px; width:400px; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.85); color:#0f0; font-family:monospace; font-size:11px; padding:8px; border-radius:8px; border:1px solid #0f0; z-index:9999;"></div>

<script>
// ===== Toast Notifications =====
function showToast(message, type = 'info') {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.textContent = message;

    container.appendChild(toast);

    // Trigger reflow
    void toast.offsetWidth;

    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => {
            if (toast.parentElement) {
                toast.parentElement.removeChild(toast);
            }
        }, 300);
    }, 3000);
}

// ===== Debug =====
const logQueue = [];
let logSending = false;

// Show on TV + send to server
function debugLog(msg) {
    const panel = document.getElementById("debug-panel");
    const time = new Date().toLocaleTimeString();
    const text = typeof msg === 'object' ? JSON.stringify(msg) : msg;

    // Show on screen
    const line = document.createElement("div");
    line.textContent = `[${time}] ${text}`;
    panel.appendChild(line);
    panel.scrollTop = panel.scrollHeight;

    // Queue for server
    logQueue.push(text);
    sendNextLog();
}

// Only send to server (not shown on TV)
function serverLog(msg) {
    const text = typeof msg === 'object' ? JSON.stringify(msg) : msg;
    logQueue.push(text);
    sendNextLog();
}

function sendNextLog() {
    if (logSending || logQueue.length === 0) return;
    logSending = true;
    const msg = logQueue.shift();
    setTimeout(() => {
        fetch("/log", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: msg})
        }).catch(() => {}).finally(() => {
            logSending = false;
            sendNextLog();
        });
    }, 0);
}

// ===== Spatial Navigation =====
let allApps = [];
let filteredApps = [];
let installedAppsData = [];
let categories = [];
let currentCategory = "All";
let navMode = 'grid'; // 'nav' (categories) or 'grid' (apps)
let focusIndex = 0; // index in current navMode

// TV Key Codes
const VK_LEFT = 37;
const VK_UP = 38;
const VK_RIGHT = 39;
const VK_DOWN = 40;
const VK_ENTER = 13;
const VK_RED = 403; // Typical code for Red button on TV

function handleKeydown(e) {
    const code = e.keyCode;

    if (code === VK_RED) {
        const panel = document.getElementById("debug-panel");
        panel.style.display = panel.style.display === "block" ? "none" : "block";
        return;
    }

    if (code === VK_ENTER) {
        if (navMode === 'nav') {
            const btns = document.querySelectorAll(".category-btn");
            if (btns[focusIndex]) {
                btns[focusIndex].click();
            }
        } else if (navMode === 'grid') {
            const tiles = document.querySelectorAll(".app-tile");
            if (tiles[focusIndex]) {
                const btn = tiles[focusIndex].querySelector("button");
                if (btn && !btn.disabled) btn.click();
            }
        }
        e.preventDefault();
        return;
    }

    if (navMode === 'nav') {
        const btns = document.querySelectorAll(".category-btn");
        const maxIndex = btns.length - 1;
        let changed = false;

        if (code === VK_RIGHT) {
            focusIndex = Math.min(focusIndex + 1, maxIndex);
            changed = true;
        } else if (code === VK_LEFT) {
            focusIndex = Math.max(focusIndex - 1, 0);
            changed = true;
        } else if (code === VK_DOWN) {
            if (filteredApps.length > 0) {
                navMode = 'grid';
                focusIndex = 0;
                changed = true;
            }
        }

        if (changed) {
            updateFocus();
            e.preventDefault();
        }
    } else if (navMode === 'grid') {
        const tiles = document.querySelectorAll(".app-tile");
        const maxIndex = tiles.length - 1;
        if (maxIndex < 0) return;

        // Calculate columns based on layout (rough estimate)
        const containerWidth = document.getElementById("app-grid").offsetWidth;
        const tileWidth = tiles[0].offsetWidth + 22; // width + gap
        const columns = Math.max(1, Math.floor(containerWidth / tileWidth));

        let changed = false;

        if (code === VK_RIGHT) {
            if (focusIndex < maxIndex) {
                focusIndex++;
                changed = true;
            }
        } else if (code === VK_LEFT) {
            if (focusIndex > 0) {
                focusIndex--;
                changed = true;
            }
        } else if (code === VK_DOWN) {
            if (focusIndex + columns <= maxIndex) {
                focusIndex += columns;
                changed = true;
            } else if (focusIndex < maxIndex) {
                focusIndex = maxIndex;
                changed = true;
            }
        } else if (code === VK_UP) {
            if (focusIndex - columns >= 0) {
                focusIndex -= columns;
                changed = true;
            } else {
                navMode = 'nav';
                // Try to focus the active category
                const btns = document.querySelectorAll(".category-btn");
                focusIndex = 0;
                btns.forEach((btn, i) => {
                    if (btn.classList.contains("active")) focusIndex = i;
                });
                changed = true;
            }
        }

        if (changed) {
            updateFocus();
            // scroll to element
            if (navMode === 'grid' && tiles[focusIndex]) {
                tiles[focusIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            e.preventDefault();
        }
    }
}

function updateFocus() {
    document.querySelectorAll(".category-btn, .app-tile").forEach(el => el.classList.remove("focus"));

    if (navMode === 'nav') {
        const btns = document.querySelectorAll(".category-btn");
        if (btns[focusIndex]) btns[focusIndex].classList.add("focus");
    } else if (navMode === 'grid') {
        const tiles = document.querySelectorAll(".app-tile");
        if (tiles[focusIndex]) tiles[focusIndex].classList.add("focus");
    }
}

// Attach event listener
document.addEventListener('keydown', handleKeydown);


// ===== Helpers =====
function createTile(app, isInstalled) {
    const container = document.getElementById("app-grid");
    const tile = document.createElement("div");
    tile.className = "app-tile";
    if (isInstalled) tile.classList.add("installed");

    // icon
    const iconWrapper = document.createElement("div");
    iconWrapper.className = "app-icon-placeholder";

    const img = document.createElement("img");
    img.alt = app.name;
    img.onload = function() {
        iconWrapper.innerHTML = '';
        iconWrapper.appendChild(this);
    };
    img.onerror = function() {
        iconWrapper.innerHTML = '';
        iconWrapper.textContent = app.name ? app.name.charAt(0).toUpperCase() : '?';
    };
    img.src = app.thumbnail_url || "";

    // title
    const title = document.createElement("div");
    title.className = "app-title";
    title.textContent = app.name;

    // description
    const desc = document.createElement("div");
    desc.className = "app-text";
    desc.textContent = app.text || "";

    // button
    const button = document.createElement("button");
    button.className = "install-button";
    if (isInstalled) {
        button.textContent = "Uninstall";
        button.onclick = () => handleUninstall(app, button, tile);
    } else {
        button.textContent = "Install";
        button.onclick = () => handleInstall(app, button, tile);
    }

    // assemble
    tile.appendChild(iconWrapper);
    tile.appendChild(title);
    tile.appendChild(desc);
    tile.appendChild(button);
    container.appendChild(tile);

    return tile;
}

// ===== Core API wrappers =====
function installApp(app, onSuccess, onError) {
    try {
        if (typeof Hisense_installApp === "function") {
            Hisense_installApp(
                app.install_app_id,
                app.name,
                app.thumbnail_url,
                app.thumbnail_url,
                app.thumbnail_url,
                app.url,
                app.store_type,
                function (res) {
                    if (!res || res === 0 || res === "0" || res === true) {
                        onSuccess && onSuccess();
                    } else {
                        onError && onError(res);
                    }
                }
            );
        } else {
            // Development mock or error
            console.warn("Hisense_installApp API unavailable");
             // Un-comment to simulate success on PC:
             // onSuccess && onSuccess(); return; 
            throw new Error("Hisense_installApp API unavailable");
        }
    } catch (e) {
        console.error("installApp error:", e);
        onError && onError(e);
    }
}

function uninstallApp(app, onSuccess, onError) {
    try {
        if (typeof Hisense_uninstallApp === "function") {
            Hisense_uninstallApp(app.install_app_id, function (res) {
                if (!res || res === 0 || res === "0" || res === true) {
                    onSuccess && onSuccess();
                } else {
                    onError && onError(res);
                }
            });
        } else {
            throw new Error("Hisense_uninstallApp API unavailable");
        }
    } catch (e) {
        console.error("uninstallApp error:", e);
        onError && onError(e);
    }
}

// ===== Handlers =====
function handleInstall(app, button, tile) {
    serverLog("Installing: " + app.name);
    button.textContent = "Installing...";
    button.disabled = true;

    installApp(
        app,
        () => {
            debugLog("Installed: " + app.name);
            serverLog("Install success: " + app.name);
            showToast(`${app.name} successfully installed!`, 'success');
            tile.classList.add("installed");
            button.textContent = "Uninstall";
            button.disabled = false;
            button.onclick = () => handleUninstall(app, button, tile);
        },
        (err) => {
            debugLog("Install failed: " + app.name);
            serverLog("Install error for " + app.name + ": " + JSON.stringify(err));
            showToast(`Failed to install ${app.name}`, 'error');
            button.textContent = "Install";
            button.disabled = false;
        }
    );
}

function handleUninstall(app, button, tile) {
    serverLog("Uninstalling: " + app.name);
    button.textContent = "Uninstalling...";
    button.disabled = true;

    uninstallApp(
        app,
        () => {
            debugLog("Uninstalled: " + app.name);
            serverLog("Uninstall success: " + app.name);
            showToast(`${app.name} uninstalled.`, 'info');
            tile.classList.remove("installed");
            button.textContent = "Install";
            button.disabled = false;
            button.onclick = () => handleInstall(app, button, tile);
        },
        (err) => {
            debugLog("Uninstall failed: " + app.name);
            serverLog("Uninstall error for " + app.name + ": " + JSON.stringify(err));
            showToast(`Failed to uninstall ${app.name}`, 'error');
            button.textContent = "Uninstall";
            button.disabled = false;
        }
    );
}

// ===== Render and Filtering =====
function renderCategories() {
    const nav = document.getElementById("category-nav");
    nav.innerHTML = "";

    // Add "All" category
    const allBtn = document.createElement("button");
    allBtn.className = `category-btn ${currentCategory === "All" ? "active" : ""}`;
    allBtn.textContent = "Все";
    allBtn.onclick = () => filterByCategory("All");
    nav.appendChild(allBtn);

    categories.forEach(cat => {
        if (!cat) return;
        const btn = document.createElement("button");
        btn.className = `category-btn ${currentCategory === cat ? "active" : ""}`;
        btn.textContent = cat;
        btn.onclick = () => filterByCategory(cat);
        nav.appendChild(btn);
    });
}

function filterByCategory(category) {
    currentCategory = category;
    renderCategories();

    if (category === "All") {
        filteredApps = [...allApps];
    } else {
        filteredApps = allApps.filter(app => app.category === category);
    }

    renderApps(filteredApps, installedAppsData);

    // Reset focus if needed
    if (navMode === 'nav') {
        const btns = document.querySelectorAll(".category-btn");
        focusIndex = Array.from(btns).findIndex(b => b.classList.contains("active"));
        if (focusIndex === -1) focusIndex = 0;
    } else {
        focusIndex = 0;
    }
    updateFocus();
}

function renderApps(appsToRender, installedIds) {
    const container = document.getElementById("app-grid");
    container.innerHTML = "";

    if (appsToRender.length === 0) {
        container.innerHTML = '<p class="status-message">No apps found in this category.</p>';
        return;
    }

    appsToRender.forEach((app) => {
        const isInstalled = installedIds.some(inst =>
            inst.id === app.install_app_id.toLowerCase() ||
            inst.name === app.name.toLowerCase() ||
            (app.url && inst.url === app.url.toLowerCase())
        );
        createTile(app, isInstalled);
    });
}

// ===== Init =====
async function loadApps() {
    serverLog("loadApps started");
    try {
        // Wait for Hisense API or timeout
        const installedIds = await new Promise((resolve) => {
            try {
                if (typeof Hisense_getInstalledApps === "function") {
                    serverLog("Hisense_getInstalledApps found, calling...");
                    const timeoutId = setTimeout(() => {
                        debugLog("API timeout");
                        serverLog("Hisense_getInstalledApps TIMEOUT after 5s");
                        resolve([]);
                    }, 5000);

                    Hisense_getInstalledApps(function (...args) {
                        clearTimeout(timeoutId);
                        serverLog("Callback received, args count: " + args.length);
                        serverLog("ARG0 type: " + typeof args[0]);
                        serverLog("ARG1 type: " + typeof args[1]);

                        // Data is in args[1], may be string or object
                        let res = args[1] || args[0];

                        // Parse if string
                        if (typeof res === 'string') {
                            serverLog("Response is string, parsing JSON...");
                            try {
                                res = JSON.parse(res);
                                serverLog("JSON parsed successfully");
                            } catch (e) {
                                debugLog("Parse error");
                                serverLog("JSON parse error: " + e);
                            }
                        }

                        if (res && res.AppInfo) {
                            serverLog("AppInfo found, count: " + res.AppInfo.length);
                            serverLog("AppInfo data: " + JSON.stringify(res.AppInfo));
                            const ids = res.AppInfo.map((a) => ({
                                id: (a.Id || a.appId || a.id || "").toLowerCase(),
                                name: (a.AppName || a.name || "").toLowerCase(),
                                url: (a.URL || a.url || "").toLowerCase(),
                            }));
                            serverLog("Parsed IDs: " + JSON.stringify(ids));
                            resolve(ids);
                        } else if (Array.isArray(res)) {
                            serverLog("Response is array, count: " + res.length);
                            const ids = res.map((a) => ({
                                id: (a.Id || a.appId || a.id || "").toLowerCase(),
                                name: (a.AppName || a.name || "").toLowerCase(),
                                url: (a.URL || a.url || "").toLowerCase(),
                            }));
                            serverLog("Parsed IDs: " + JSON.stringify(ids));
                            resolve(ids);
                        } else {
                            serverLog("No usable data, res type: " + typeof res);
                            resolve([]);
                        }
                    });
                } else {
                    debugLog("Hisense API not available");
                    serverLog("Hisense_getInstalledApps is NOT a function");
                    resolve([]);
                }
            } catch (e) {
                debugLog("API error");
                serverLog("Hisense API exception: " + e.message + " | " + e.stack);
                resolve([]);
            }
        });

        serverLog("Fetching /apps...");
        const resp = await fetch("/apps");
        serverLog("Fetch response status: " + resp.status);
        allApps = await resp.json();
        installedAppsData = installedIds;
        serverLog("Got " + allApps.length + " apps from server");

        // Extract categories
        const catSet = new Set();
        allApps.forEach(app => {
            if (app.category) catSet.add(app.category);
        });
        categories = Array.from(catSet).sort();

        // Initial render
        filterByCategory("All");

        // Initial focus setup
        navMode = 'nav';
        focusIndex = 0;
        updateFocus();

        debugLog("Loaded " + allApps.length + " apps, " + installedIds.length + " installed");
        serverLog("renderApps completed");

    } catch (e) {
        debugLog("ERROR: " + e.message);
        serverLog("loadApps error: " + e.message + " | " + e.stack);
        const msg = document.getElementById("loading-message");
        if(msg) msg.textContent = "Error loading apps.";
    }
}


window.addEventListener("DOMContentLoaded", loadApps);
</script>
</body>
</html>
